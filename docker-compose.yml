# Run ONE app at a time (mutually exclusive profiles). Host ports are fixed so logs match
# the URL you open in the browser (avoids confusion when another app uses 8501).
#
#   Single-image UI:  http://localhost:8504  —  docker compose --profile single up --build
#   Batch UI:         http://localhost:8503  —  docker compose --profile batch up --build
#
# Stack (pinned): Python 3.12.13 | packages in requirements.txt | uv 0.9.7
# Still raise Docker Desktop → Settings → Resources → Memory if analysis OOMs (e.g. 12G+).

services:
  single-image-nmj-analysis:
    profiles:
      - single
    build: .
    volumes:
      - .:/app
    ports:
      - "8504:8504"
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: streamlit run BTX.py --server.port=8504 --server.address=0.0.0.0 --server.fileWatcherType=none --server.runOnSave=false --browser.gatherUsageStats=false
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G

  multiple-image-nmj-analysis:
    profiles:
      - batch
    build: .
    volumes:
      - .:/app
    ports:
      - "8503:8503"
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: streamlit run BTX_batch.py --server.port=8503 --server.address=0.0.0.0 --server.fileWatcherType=none --server.runOnSave=false --browser.gatherUsageStats=false
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
